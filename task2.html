<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


</head>
<body class="bg-danger text-white">
    <div class="container my-5   ">
        <div class="row">
           <!-- <div class="col-3"></div>-->
            <div class="col-12  text-center mt-5" >
                <button class="btn btn-warning py-3 px-4" id="btn">Load userId</button>
                <div id="data"></div>
            </div>
            <!--<div class="col-3"></div>-->
        </div>
    </div>
    
</body>
<script>
    const btn=document.getElementById('btn')
    const data=document.getElementById('data')
    btn.addEventListener("click",async function getapidata() {
        try{
              const apidata=await fetch('https://jsonplaceholder.typicode.com/posts')
              const jsondata=await apidata.json()
             // console.log(jsondata)
             let two=[]
            jsondata.forEach(element => {
                 two+=( element.userId)
                
              });
              console.log(two)

              //console.log(one)
             data.innerHTML=`<ul>
                                    <li>${two}</li>
                          </ul>
                               `

        }
        catch(err){
            console.log(err)

        }
      
        
    })
   //getapidata()
</script>
</html>
